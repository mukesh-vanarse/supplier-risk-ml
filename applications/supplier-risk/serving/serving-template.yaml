apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: supplier-risk-sklearn-serving
  labels:
    scenario: supplier-risk-sklearn
spec:
  template:
    spec:
      containers:
        - name: inference
          image: ghcr.io/mukesh-vanarse/supplier-risk-ml/supplier-risk-sklearn:1.0
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: "2Gi"
            requests:
              cpu: "0.5"
              memory: "1Gi"